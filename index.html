<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico de Operação Comercial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0B0F19; /* Fundo escuro premium */
            color: #F3F4F6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
            padding: 40px 24px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .tag {
            display: inline-block;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #6366F1; /* Azul/Roxo tecnológico sutil */
            font-weight: 700;
            margin-bottom: 24px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.25;
            letter-spacing: -0.025em;
            color: #FFFFFF;
            margin-bottom: 16px;
        }

        p {
            font-size: 1.1rem;
            color: #9CA3AF;
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn-whatsapp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #10B981; /* Verde esmeralda de conversão */
            color: #FFFFFF;
            text-decoration: none;
            padding: 16px 32px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.3);
            width: 100%;
        }

        .btn-whatsapp:hover {
            background-color: #059669;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        @media (max-width: 480px) {
            h1 { font-size: 1.8rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <span class="tag">Análise de Performance Comercial</span>
        
        <h1>A maioria das operações B2B perde 30% da margem na mesa por falhas de ancoragem.</h1>
        
        <p>Abaixo está o acesso ao painel estratégico de inteligência e ao diagnóstico da sua operação.</p>

        <a href="https://api.whatsapp.com/send?phone=55XXXXXXXXXXX&text=Quero%20liberar%20o%20acesso%20ao%20diagnóstico%20da%20minha%20operação" 
           target="_blank" 
           class="btn-whatsapp">
            Liberar Acesso ao Diagnóstico Completo
        </a>
    </div>

</body>
</html>
